name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          python -m compileall -q monitor shared engagement advisor migrations

      - name: Verify migrations are runnable (offline mode)
        env:
          DATABASE_URL: postgresql+psycopg://placeholder:placeholder@localhost:5432/placeholder
        run: |
          # Smoke-test that alembic env loads
          python -c "from migrations.env import target_metadata; print(f'{len(target_metadata.tables)} tables in metadata')"
